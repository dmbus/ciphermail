<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CipherMail</title>
    <style>
        body { width: 300px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; }
        h3 { margin: 0 0 16px 0; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1557b0; }
        #cancelBtn { background: #f1f3f4; color: #5f6368; margin-top: 8px; }
        #cancelBtn:hover { background: #e8eaed; }
        .note { font-size: 11px; color: #5f6368; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
    <h3>CipherMail</h3>
    <p style="font-size:13px;color:#5f6368;margin-bottom:12px;">Enter your passphrase:</p>
    <input type="password" id="passphrase" placeholder="Passphrase" autofocus>
    <button id="submitBtn">Decrypt</button>
    <button id="cancelBtn">Cancel</button>
    <p class="note">Your passphrase is processed locally and never transmitted.</p>
    <script src="offscreen.js"></script>
</body>
</html>
